<table>
  <thead>
    <tr>
      <th>Product</th>
      <th>Price</th>
      <th>Remaining</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let product of products; let i = index">
      <td class="name-cell">
        <div class="product-image" *ngIf="product.image; else noImage">
          <img [src]="'assets/products/images/' + product.image" [alt]="product.name" />
        </div>
        <ng-template #noImage>
          <div class="product-placeholder">?</div>
        </ng-template>
        <span>{{ product.name }}</span>
      </td>
      <td>${{ product.price }}</td>
      <td>{{ product.remaining }}</td>
      <td>
        <button type="button" [disabled]="product.remaining === 0" (click)="handleAction(i)">
          {{ buttonLabel }}
        </button>
      </td>
    </tr>
  </tbody>
</table>
