<section class="page">
  <h2>Your Cart</h2>

  <div *ngIf="!store.cartItems.length">
    <p>Your cart is empty. <a routerLink="/inventory">Browse inventory</a> to add items.</p>
  </div>

  <div *ngIf="store.cartItems.length">
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Quantity</th>
          <th>Line Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of store.cartItems">
          <td>{{ item.product?.name }}</td>
          <td>{{ item.quantity }}</td>
          <td>${{ (item.product?.price ?? 0) * item.quantity | number:'1.2-2' }}</td>
          <td>
            <button type="button" (click)="remove(item.product!.id)">Remove</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="summary">
      <p><strong>Total:</strong> ${{ store.cartTotal.toFixed(2) }}</p>
      <a routerLink="/checkout"><button type="button">Proceed to Checkout</button></a>
    </div>
  </div>
</section>
